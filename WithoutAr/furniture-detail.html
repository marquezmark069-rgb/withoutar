<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furniture Details - ecl FURNITURE MART</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .detail-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      margin-bottom: 3rem;
    }

    @media (max-width: 768px) {
      .detail-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
    }

    .detail-image-container {
      width: 100%;
      height: 500px;
      background: #f3f4f6;
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .detail-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .detail-title {
      font-size: 2rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 1rem;
    }

    .detail-price {
      font-size: 2rem;
      font-weight: 700;
      color: #4ECDC4;
      margin-bottom: 1.5rem;
    }

    .detail-info {
      background: #f9fafb;
      padding: 1.5rem;
      border-radius: 0.5rem;
      margin-bottom: 2rem;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 600;
      color: #374151;
    }

    .detail-value {
      color: #6b7280;
    }

    .detail-description {
      margin-bottom: 2rem;
    }

    .detail-description h3 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #111827;
      margin-bottom: 0.75rem;
    }

    .detail-description p {
      color: #6b7280;
      line-height: 1.6;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #4ECDC4;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 2rem;
      text-decoration: none;
    }

    .back-button:hover {
      color: #3db8af;
      gap: 0.75rem;
    }
  </style>
</head>
<body>
  
  <header class="header">
    <div class="header-container">
      <div style="cursor: pointer;" onclick="window.location.href='index.html'">
        <img src="ecl-logo.png" alt="ECL Furniture Mart" class="logo">
      </div>

      <nav class="nav">
        <a href="index.html" class="nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span>Home</span>
        </a>
        <a href="furniture-list.html" class="nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line>
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          </svg>
          <span>Furnitures</span>
        </a>
        <a href="about.html" class="nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          <span>About</span>
        </a>
        <a href="contact.html" class="nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          <span>Contact</span>
        </a>
        <a href="track-delivery.html" class="nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="3" width="15" height="13"></rect>
            <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
            <circle cx="5.5" cy="18.5" r="2.5"></circle>
            <circle cx="18.5" cy="18.5" r="2.5"></circle>
          </svg>
          <span>Track Delivery</span>
        </a>
      </nav>

      <button class="staff-login" onclick="window.location.href='login.html'">
        Login
      </button>
    </div>
  </header>

  
  <section class="section">
    <div class="detail-container">
      <a href="furniture-list.html" class="back-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Furniture List
      </a>

      <div class="detail-grid">
        
        <div class="detail-image-container">
          <img id="productImage" src="" alt="Product" class="detail-image">
        </div>

        
        <div class="detail-content">
          <h1 id="productName" class="detail-title">Product Name</h1>
          <div id="productPrice" class="detail-price">₱0.00</div>

          <div class="detail-info">
            <div class="detail-row">
              <span class="detail-label">Category:</span>
              <span id="productCategory" class="detail-value">-</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Material:</span>
              <span id="productMaterial" class="detail-value">-</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Dimensions:</span>
              <span id="productDimensions" class="detail-value">-</span>
            </div>
          </div>

          <div class="detail-description">
            <h3>Description</h3>
            <p id="productDescription">Product description will appear here.</p>
          </div>

          <div style="display: flex; gap: 1rem;">
            <button class="btn btn-primary" onclick="alert('Ar View coming soon!')">
              View in AR
            </button>
            <button class="btn btn-secondary" onclick="window.location.href='contact.html'">
              Contact Us
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  
  <footer class="footer">
    <div class="footer-container">
      <div>
        <img src="ecl-logo.png" alt="ECL Furniture Mart" class="logo" style="margin-bottom: 0.5rem;">
        <p class="footer-text">Quality furniture for your home</p>
      </div>
      <div style="text-align: right;">
        <p class="footer-text">© 2026 ecl FURNITURE MART. All rights reserved.</p>
      </div>
    </div>
  </footer>

  
  <script src="main.js"></script>
</body>
</html>
