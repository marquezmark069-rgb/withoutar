<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ecl FURNITURE MART</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <header class="header">
    <div class="header-container">
      <div style="cursor: pointer;" data-navigate="index.html">
        <img src="ecl-logo.png" alt="ECL Furniture Mart" class="logo">
      </div>

      <nav class="nav">
        <a href="index.html" class="nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span>Home</span>
        </a>
        <a href="furniture-list.html" class="nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line>
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          </svg>
          <span>Furnitures</span>
        </a>
        <a href="about.html" class="nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          <span>About</span>
        </a>
        <a href="contact.html" class="nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          <span>Contact</span>
        </a>
        <a href="track-delivery.html" class="nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="3" width="15" height="13"></rect>
            <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
            <circle cx="5.5" cy="18.5" r="2.5"></circle>
            <circle cx="18.5" cy="18.5" r="2.5"></circle>
          </svg>
          <span>Track Delivery</span>
        </a>
      </nav>

      <button class="staff-login" data-navigate="login.html">
         Login
      </button>
    </div>
  </header>

  
  <section class="section" style="min-height: calc(100vh - 300px); display: flex; align-items: center; justify-content: center;">
    <div style="width: 100%; max-width: 480px;">
      <!-- Login Card -->
      <div id="loginCard" class="card" style="padding: 4.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
          <div style="width: 4rem; height: 4rem; background: rgba(78, 205, 196, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
            <img src="ecl-logo.png" alt="ECL Furniture Mart" class="logo" style="margin-bottom: 0.5rem; border-radius: 90%; width: 10rem; height: 10rem;">
            </svg>
          </div>
          <h1 style="font-size: 1.875rem; font-weight: 700; color: #111827; margin-bottom: 0.5rem;">Welcome Back</h1>
          <p style="color: #4b5563; font-size: 0.875rem;">Login to access your dashboard</p>
        </div>

        >
        <div id="loginError" class="alert alert-error hidden" style="margin-bottom: 1.5rem;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span id="loginErrorMsg">Invalid username or password</span>
        </div>

        
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="btn btn-accent" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
              <polyline points="10 17 15 12 10 7"></polyline>
              <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
            Login
          </button>
        </form>

      

       

  
  <footer class="footer">
    <div class="footer-container">
      <div>
        <img src="ecl-logo.png" alt="ECL Furniture Mart" class="logo" style="margin-bottom: 0.5rem;">
        <p class="footer-text">Quality furniture for your home</p>
      </div>
      <div style="text-align: right;">
        <p class="footer-text">© 2026 ecl FURNITURE MART. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
